<!doctype html>
<html lang="zh-TW" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>軸對稱字母遊戲 - 終極慶祝版</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&amp;family=Varela+Round&amp;display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Nunito', 'Varela Round', sans-serif; }
    
    /* --- 動畫定義 --- */
    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 20px rgba(99, 102, 241, 0.4); }
      50% { box-shadow: 0 0 40px rgba(99, 102, 241, 0.8); }
    }
    
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }
    
    @keyframes bounce-in {
      0% { transform: scale(0); opacity: 0; }
      50% { transform: scale(1.2); }
      100% { transform: scale(1); opacity: 1; }
    }
    
    @keyframes sparkle {
      0%, 100% { opacity: 0; transform: scale(0) rotate(0deg); }
      50% { opacity: 1; transform: scale(1) rotate(180deg); }
    }
    
    /* 鑰匙出現動畫 */
    @keyframes key-pop {
      0% { transform: scale(0) rotate(-45deg); opacity: 0; }
      60% { transform: scale(1.2) rotate(10deg); }
      80% { transform: scale(0.95) rotate(-5deg); }
      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }
    
    /* 鑰匙懸浮動畫 */
    @keyframes key-float {
      0%, 100% { transform: translateY(0); filter: drop-shadow(0 10px 15px rgba(0,0,0,0.3)); }
      50% { transform: translateY(-15px); filter: drop-shadow(0 25px 20px rgba(0,0,0,0.2)); }
    }
    
    /* --- 卡片樣式 --- */
    .letter-card {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden; 
      z-index: 1; 
    }
    
    .letter-card:hover:not(.selected):not(.disabled) {
      transform: translateY(-8px) scale(1.05);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
      z-index: 10;
    }
    
    .letter-card.selected {
      animation: pulse-glow 1.5s ease-in-out infinite;
      pointer-events: none; 
      border-color: #6366f1;
      background: linear-gradient(135deg, #c7d2fe, #ddd6fe);
    }

    .letter-card.disabled {
      opacity: 0.6;
      background: #f3f4f6;
      cursor: default;
    }
    
    .sparkle { animation: sparkle 1.5s ease-in-out infinite; }
    
    .bg-pattern {
      background-image: 
        radial-gradient(circle at 20% 80%, rgba(99, 102, 241, 0.1) 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, rgba(236, 72, 153, 0.1) 0%, transparent 50%),
        radial-gradient(circle at 40% 40%, rgba(34, 211, 238, 0.08) 0%, transparent 40%);
    }

    /* --- 3D 氣球字體樣式 --- */
    .letter-text {
        font-family: 'Varela Round', sans-serif;
        font-weight: bold;
        line-height: 1;
        text-shadow: 
            2px 2px 0px rgba(0,0,0,0.1),
            inset 4px 4px 8px rgba(255,255,255,0.7),
            inset -3px -3px 8px rgba(0,0,0,0.1);
        filter: drop-shadow(3px 5px 5px rgba(0,0,0,0.2));
    }

    /* SVG 樣式 (針對 C) */
    .letter-svg { 
        filter: drop-shadow(2px 4px 4px rgba(0,0,0,0.2)); 
    }

    /* 通用圖層樣式 */
    .letter-layer {
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        display: flex; justify-content: center; align-items: center;
        backface-visibility: visible;
        transform-style: preserve-3d;
        box-sizing: border-box; 
    }
    
    .folding-effect { opacity: 0.7; filter: brightness(0.6) contrast(1.1); }

    .axis-line {
        position: absolute; z-index: 20; display: none;
        pointer-events: none; border: none; 
    }

    /* Modal 相關 */
    .modal-overlay {
        backdrop-filter: blur(5px);
        background-color: rgba(0, 0, 0, 0.5);
    }

    /* 顏色定義 */
    .color-T { color: #6366f1; }
    .color-C { color: #ec4899; } 
    .color-A { color: #22d3ee; }
    .color-G { color: #f59e0b; }
    .color-L { color: #10b981; }
    .color-N { color: #8b5cf6; }

  </style>
 </head>
 <body class="h-full bg-gradient-to-br from-indigo-50 via-white to-pink-50 bg-pattern overflow-auto">
  <div id="app" class="w-full min-h-full flex flex-col items-center justify-center p-6">
   <!-- 標題區 -->
   <div class="text-center mb-8">
    <h1 class="text-4xl md:text-5xl font-extrabold bg-gradient-to-r from-indigo-600 via-purple-600 to-pink-600 bg-clip-text text-transparent mb-3">🔍 軸對稱字母大挑戰</h1>
    <p class="text-gray-600 text-lg">找出所有軸對稱的字母，就能獲得神秘鑰匙！</p>
    
    <!-- 進度指示器 -->
    <div class="mt-4 flex items-center justify-center gap-2">
      <span class="text-gray-500">已收集鑰匙碎片：</span>
      <div id="progress" class="flex gap-1">
        <!-- JS 動態生成 -->
      </div>
    </div>
   </div>

   <!-- 字母卡片網格 -->
   <div id="letters-grid" class="grid grid-cols-3 md:grid-cols-6 gap-4 md:gap-6 mb-8 max-w-4xl w-full">
     <!-- JS 動態生成 -->
   </div>

   <!-- 成功區 (預設隱藏，用於顯示鑰匙) -->
   <div id="success-area" class="hidden flex-col items-center gap-6 mt-4 relative z-50"></div>

   <!-- 重置按鈕 --> 
   <button id="reset-btn" class="mt-6 px-6 py-3 bg-gradient-to-r from-gray-400 to-gray-500 text-white rounded-full font-semibold hover:from-gray-500 hover:to-gray-600 transition-all shadow-lg hover:shadow-xl hidden"> 
     🔄 再玩一次 
   </button>
  </div>

  <!-- 遊戲視窗 (Modal) -->
  <div id="game-modal" class="fixed inset-0 z-40 hidden flex items-center justify-center modal-overlay">
    <div class="bg-white rounded-3xl shadow-2xl p-6 w-full max-w-md mx-4 relative border-4 border-indigo-100 flex flex-col items-center">
        
        <!-- 對話框/狀態列 -->
        <div id="modal-message" class="w-full bg-yellow-50 text-yellow-800 font-bold px-4 py-3 rounded-xl text-center mb-4 min-h-[3.5rem] flex items-center justify-center border border-yellow-200">
            這個字母是軸對稱圖形嗎？
        </div>

        <!-- 演示舞台 -->
        <div class="w-64 h-64 bg-gray-50 rounded-2xl border-2 border-dashed border-gray-300 relative flex justify-center items-center overflow-hidden mb-6">
            <!-- 動畫容器 -->
            <div id="modal-anim-wrapper" class="w-full h-full relative">
                <div id="modal-axis" class="axis-line"></div>
                <!-- 內容會由 JS 動態注入 -->
                <div id="modal-base-layer" class="letter-layer text-8xl"></div>
                <div id="modal-fold-layer" class="letter-layer text-8xl"></div>
            </div>
        </div>

        <!-- 選擇按鈕 -->
        <div id="choice-buttons" class="flex gap-4 w-full">
            <button onclick="handleUserGuess(true)" class="flex-1 bg-green-500 hover:bg-green-600 text-white font-bold py-3 px-4 rounded-xl shadow-md transition-transform active:scale-95 flex flex-col items-center">
                <span class="text-2xl mb-1">⭕</span>
                <span>是</span>
            </button>
            <button onclick="handleUserGuess(false)" class="flex-1 bg-red-500 hover:bg-red-600 text-white font-bold py-3 px-4 rounded-xl shadow-md transition-transform active:scale-95 flex flex-col items-center">
                <span class="text-2xl mb-1">❌</span>
                <span>不是</span>
            </button>
        </div>

        <!-- 返回按鈕 (預設隱藏) -->
        <button id="close-modal-btn" onclick="closeModal()" class="hidden w-full bg-slate-500 hover:bg-slate-600 text-white font-bold py-3 px-4 rounded-xl shadow-md transition-transform active:scale-95 mt-4">
            ↩️ 返回題目
        </button>

    </div>
  </div>

  <script>
    // 音效設定
    const winAudio = new Audio('https://assets.mixkit.co/sfx/preview/mixkit-winning-chimes-2015.mp3');
    winAudio.volume = 0.5;
    const correctAudio = new Audio('https://assets.mixkit.co/sfx/preview/mixkit-correct-answer-tone-2870.mp3');
    const wrongAudio = new Audio('https://assets.mixkit.co/sfx/preview/mixkit-wrong-answer-fail-notification-946.mp3');

    // 字母資料
    // isSvg: true 代表使用 SVG 繪製，確保幾何完美對稱 (針對 C)
    const letters = [
      { id: 'T', letter: 'T', isSymmetric: true, colorClass: 'color-T', axis: 'vertical', isSvg: false, fixTop: 0 },
      { id: 'C', letter: 'C', isSymmetric: true, colorClass: 'color-C', axis: 'horizontal', isSvg: true, fixTop: 0 }, 
      { id: 'A', letter: 'A', isSymmetric: true, colorClass: 'color-A', axis: 'vertical', isSvg: false, fixTop: 0 },
      { id: 'G', letter: 'G', isSymmetric: false, colorClass: 'color-G', axis: 'vertical', isSvg: false, fixTop: 0 },
      { id: 'L', letter: 'L', isSymmetric: false, colorClass: 'color-L', axis: 'vertical', isSvg: false, fixTop: 0 },
      { id: 'N', letter: 'N', isSymmetric: false, colorClass: 'color-N', axis: 'vertical', isSvg: false, fixTop: 0 }
    ];

    let selectedCorrect = []; 
    let completedLetters = []; 
    let gameCompleted = false;
    let currentLetterData = null; 

    // 產生字母內容
    function getLetterContent(item, sizeClass = "text-6xl md:text-7xl") {
        if (item.isSvg) {
            // 使用 SVG 繪製完美的 C，確保上下半部完全對稱
            return `
            <svg viewBox="0 0 100 100" class="w-2/3 h-2/3 letter-svg" style="color: inherit;">
                <path d="M 80.3 32.5 A 35 35 0 1 0 80.3 67.5" 
                      fill="none" 
                      stroke="currentColor" 
                      stroke-width="22" 
                      stroke-linecap="round" />
            </svg>
            `;
        } else {
            return `<span class="letter-text ${sizeClass}">${item.letter}</span>`;
        }
    }

    // 渲染主畫面字母卡片
    function renderLetters() {
      const grid = document.getElementById('letters-grid');
      
      if (grid.children.length === 0) {
          const shuffledLetters = [...letters].sort(() => Math.random() - 0.5);
          
          grid.innerHTML = shuffledLetters.map((item, index) => {
            const content = getLetterContent(item);
            const adjustStyle = item.fixTop !== 0 ? `top: ${item.fixTop}px;` : '';
            
            return `
            <div 
              class="letter-card w-24 h-24 md:w-32 md:h-32 rounded-2xl bg-white shadow-lg flex items-center justify-center cursor-pointer border-4 border-transparent hover:border-indigo-300 relative"
              onclick="openModal('${item.id}')"
              id="card-${item.id}"
            >
              <div class="w-full h-full relative flex justify-center items-center">
                 <div class="letter-layer ${item.colorClass}" style="${adjustStyle}">
                    ${content}
                 </div>
              </div>
            </div>
          `}).join('');
      } else {
          letters.forEach(item => {
              const card = document.getElementById(`card-${item.id}`);
              if (selectedCorrect.includes(item.id)) {
                  card.classList.add('selected');
                  card.classList.remove('disabled');
              } else if (completedLetters.includes(item.id)) {
                  card.classList.add('disabled');
              } else {
                  card.classList.remove('selected', 'disabled');
              }
          });
      }
      updateProgress();
    }

    // --- Modal 邏輯 ---

    function openModal(id) {
        if (gameCompleted) return;
        if (selectedCorrect.includes(id)) return; 

        currentLetterData = letters.find(l => l.id === id);
        
        // 1. 填充內容
        const content = getLetterContent(currentLetterData, "text-8xl");
        const baseLayer = document.getElementById('modal-base-layer');
        const foldLayer = document.getElementById('modal-fold-layer');
        
        const adjustStyle = currentLetterData.fixTop !== 0 ? `top: ${currentLetterData.fixTop}px;` : '';
        
        baseLayer.className = `letter-layer text-8xl ${currentLetterData.colorClass}`;
        baseLayer.style.cssText = adjustStyle;
        baseLayer.innerHTML = content;
        
        foldLayer.className = `letter-layer text-8xl ${currentLetterData.colorClass} half-letter`;
        foldLayer.style.cssText = adjustStyle;
        foldLayer.innerHTML = content;

        // 2. 重置動畫狀態
        resetAnimationState();

        // 3. 重置 UI
        document.getElementById('modal-message').innerText = `這個圖案是軸對稱圖形嗎？`;
        document.getElementById('modal-message').className = "w-full bg-yellow-50 text-yellow-800 font-bold px-4 py-3 rounded-xl text-center mb-4 min-h-[3.5rem] flex items-center justify-center border border-yellow-200";
        
        document.getElementById('choice-buttons').style.display = 'flex';
        document.getElementById('close-modal-btn').style.display = 'none';

        // 4. 顯示 Modal
        document.getElementById('game-modal').classList.remove('hidden');
    }

    function handleUserGuess(isYes) {
        document.getElementById('choice-buttons').style.display = 'none';
        
        const messageBox = document.getElementById('modal-message');
        const isSymmetric = currentLetterData.isSymmetric;
        let isCorrect = (isYes === isSymmetric);

        if (isCorrect) {
            correctAudio.play();
            messageBox.className = "w-full bg-green-100 text-green-800 font-bold px-4 py-3 rounded-xl text-center mb-4 min-h-[3.5rem] flex items-center justify-center border border-green-200";
            
            if (isSymmetric) {
                messageBox.innerText = "答對了！它是對稱的。\n看！對摺後完全重疊！";
                if (!selectedCorrect.includes(currentLetterData.id)) {
                    selectedCorrect.push(currentLetterData.id);
                }
            } else {
                messageBox.innerText = "答對了！它不是對稱的。\n看！對摺後無法重疊。";
            }
            
            if (!completedLetters.includes(currentLetterData.id)) {
                completedLetters.push(currentLetterData.id);
            }

        } else {
            wrongAudio.play();
            messageBox.className = "w-full bg-red-100 text-red-800 font-bold px-4 py-3 rounded-xl text-center mb-4 min-h-[3.5rem] flex items-center justify-center border border-red-200";
            
            if (isSymmetric) {
                messageBox.innerText = "哎呀！其實它是對稱的喔。\n看！對摺後是可以重疊的。";
            } else {
                messageBox.innerText = "哎呀！它不是對稱的。\n看！深色影子跑出來了。";
            }
        }

        // 播放動畫
        playFoldAnimation(currentLetterData.axis);

        // 顯示返回按鈕
        setTimeout(() => {
            document.getElementById('close-modal-btn').style.display = 'block';
        }, 1500);
    }

    function closeModal() {
        document.getElementById('game-modal').classList.add('hidden');
        renderLetters(); 
        
        // 檢查是否勝利 (集滿 3 個對稱字母)
        if (selectedCorrect.length === 3 && !gameCompleted) {
            setTimeout(showSuccess, 500);
        }
    }

    // --- 動畫邏輯 ---

    function resetAnimationState() {
        const baseLayer = document.getElementById('modal-base-layer');
        const foldLayer = document.getElementById('modal-fold-layer');
        const axis = document.getElementById('modal-axis');
        
        axis.style.display = 'none';
        foldLayer.style.transition = 'none';
        foldLayer.style.transform = 'none';
        baseLayer.style.clipPath = 'none';
        foldLayer.style.clipPath = 'none';
        foldLayer.classList.remove('folding-effect');
    }

    function playFoldAnimation(axisType) {
        const baseLayer = document.getElementById('modal-base-layer');
        const foldLayer = document.getElementById('modal-fold-layer');
        const axis = document.getElementById('modal-axis');
        
        axis.style.display = 'block';
        axis.style.border = 'none'; 
        
        void foldLayer.offsetWidth; // Force Reflow
        
        foldLayer.style.transition = 'transform 2s ease-in-out';
        foldLayer.classList.add('folding-effect');

        if (axisType === 'vertical') {
            // 垂直對摺
            axis.style.width = '0';
            axis.style.height = '100%';
            axis.style.left = '50%';
            axis.style.top = '0';
            axis.style.borderLeft = '2px dashed #ff1744';

            baseLayer.style.clipPath = 'polygon(0 0, 50% 0, 50% 100%, 0 100%)';
            foldLayer.style.clipPath = 'polygon(50% 0, 100% 0, 100% 100%, 50% 100%)';
            foldLayer.style.transformOrigin = 'center'; 
            
            setTimeout(() => {
                foldLayer.style.transform = 'rotateY(-180deg)';
            }, 50);

        } else {
            // 水平對摺
            axis.style.width = '100%';
            axis.style.height = '0';
            axis.style.left = '0';
            axis.style.top = '50%';
            axis.style.borderTop = '2px dashed #ff1744';

            baseLayer.style.clipPath = 'polygon(0 0, 100% 0, 100% 50%, 0 50%)';
            foldLayer.style.clipPath = 'polygon(0 50%, 100% 50%, 100% 100%, 0 100%)';
            foldLayer.style.transformOrigin = 'center';
            
            setTimeout(() => {
                foldLayer.style.transform = 'rotateX(180deg)';
            }, 50);
        }
    }

    // --- 遊戲狀態管理 ---

    function updateProgress() {
      const progress = document.getElementById('progress');
      const totalCorrect = 3; 
      
      let html = '';
      
      selectedCorrect.forEach(id => {
         const item = letters.find(l => l.id === id);
         html += `<span class="w-8 h-8 rounded-full bg-gradient-to-br from-indigo-500 to-purple-500 text-white flex items-center justify-center text-sm font-bold shadow-md animate-[bounce-in_0.5s_ease-out]">${item.letter}</span>`;
      });
      
      for(let i = 0; i < totalCorrect - selectedCorrect.length; i++) {
          html += `<span class="w-8 h-8 rounded-full bg-gray-200 flex items-center justify-center text-sm text-gray-400">?</span>`;
      }
      
      progress.innerHTML = html;
    }

    function showSuccess() {
      gameCompleted = true;
      
      // 播放勝利音效
      winAudio.currentTime = 0;
      winAudio.play().catch(e => console.log("Audio play blocked:", e));

      const successArea = document.getElementById('success-area');
      successArea.classList.remove('hidden');
      successArea.classList.add('flex');
      
      // 插入真實感 SVG 黃金鑰匙
      successArea.innerHTML = `
        <div class="relative">
          <!-- 星星特效 -->
          <div class="absolute -top-4 -left-4 text-3xl sparkle" style="animation-delay: 0s">✨</div>
          <div class="absolute -top-4 -right-4 text-3xl sparkle" style="animation-delay: 0.3s">⭐</div>
          <div class="absolute -bottom-4 -left-4 text-3xl sparkle" style="animation-delay: 0.6s">🌟</div>
          <div class="absolute -bottom-4 -right-4 text-3xl sparkle" style="animation-delay: 0.9s">💫</div>
          
          <!-- 真實感 SVG 黃金鑰匙 -->
          <div class="w-64 h-64 flex items-center justify-center animate-[key-pop_0.8s_cubic-bezier(0.34,1.56,0.64,1)_forwards]">
            <svg viewBox="0 0 200 200" class="w-full h-full animate-[key-float_3s_ease-in-out_infinite]">
              <defs>
                <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" style="stop-color:#bf953f;stop-opacity:1" />
                  <stop offset="25%" style="stop-color:#fcf6ba;stop-opacity:1" />
                  <stop offset="50%" style="stop-color:#b38728;stop-opacity:1" />
                  <stop offset="75%" style="stop-color:#fbf5b7;stop-opacity:1" />
                  <stop offset="100%" style="stop-color:#aa771c;stop-opacity:1" />
                </linearGradient>
                <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
                  <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
                  <feOffset dx="2" dy="4" result="offsetblur"/>
                  <feComponentTransfer>
                    <feFuncA type="linear" slope="0.3"/>
                  </feComponentTransfer>
                  <feMerge> 
                    <feMergeNode/>
                    <feMergeNode in="SourceGraphic"/> 
                  </feMerge>
                </filter>
              </defs>
              <g transform="rotate(45, 100, 100)" filter="url(#dropShadow)">
                <rect x="90" y="80" width="20" height="100" rx="2" fill="url(#goldGradient)" stroke="#8a600d" stroke-width="1"/>
                <path d="M90 150 L70 150 L70 160 L90 160 M90 165 L70 165 L70 175 L90 175" fill="url(#goldGradient)" stroke="#8a600d" stroke-width="1"/>
                <path d="M100 30 C 130 30, 140 50, 140 70 C 140 90, 120 100, 100 100 C 80 100, 60 90, 60 70 C 60 50, 70 30, 100 30 Z" fill="url(#goldGradient)" stroke="#8a600d" stroke-width="1"/>
                <path d="M100 45 C 115 45, 120 55, 120 65 C 120 75, 110 80, 100 80 C 90 80, 80 75, 80 65 C 80 55, 85 45, 100 45 Z" fill="#8a600d" opacity="0.3"/>
                <path d="M100 35 C 120 35, 130 50, 130 70" fill="none" stroke="#fffae6" stroke-width="2" opacity="0.6"/>
                <line x1="95" y1="85" x2="95" y2="175" stroke="#fffae6" stroke-width="2" opacity="0.4"/>
              </g>
            </svg>
          </div>
        </div>
        
        <div class="message-popup text-center mt-4 px-4">
          <h2 class="text-2xl md:text-3xl font-bold bg-gradient-to-r from-amber-500 via-orange-500 to-red-500 bg-clip-text text-transparent mb-2">
            恭喜你！你已成功取得鑰匙 🎉
          </h2>
          <p class="text-gray-600">你找到了所有的軸對稱字母：T、C、A</p>
        </div>
      `;

      document.getElementById('reset-btn').classList.remove('hidden');
    }

    function resetGame() {
      selectedCorrect = [];
      completedLetters = [];
      gameCompleted = false;
      
      document.getElementById('success-area').classList.add('hidden');
      document.getElementById('success-area').classList.remove('flex');
      document.getElementById('reset-btn').classList.add('hidden');
      document.getElementById('letters-grid').innerHTML = ''; 
      
      renderLetters();
      updateProgress();
    }

    // 初始化
    document.getElementById('reset-btn').addEventListener('click', resetGame);
    renderLetters();
    updateProgress();

  </script>
 </body>
</html>
