<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>二年級數學：多變角色平移挑戰</title>
    <style>
        /* --- 介面設計 (維持可愛風格) --- */
        body {
            font-family: '微軟正黑體', 'Microsoft JhengHei', sans-serif;
            background-color: #e0f2f1; /* 淺藍綠色背景 */
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        h1 { color: #00695c; margin-bottom: 5px; }
        p.subtitle { color: #00897b; margin-bottom: 20px; font-weight: bold; font-size: 1.1em; }

        .main-wrapper {
            display: flex;
            gap: 30px;
            align-items: flex-start;
            flex-wrap: wrap;
            justify-content: center;
        }

        /* 畫布 */
        canvas {
            background-color: #ffffff;
            border: 5px solid #26a69a;
            border-radius: 15px;
            box-shadow: 8px 8px 0px rgba(38, 166, 154, 0.2);
            max-width: 100%;
            height: auto;
        }

        /* 控制面板 */
        .control-panel {
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 360px;
            border-top: 10px solid #4db6ac;
        }

        /* 步驟區塊 */
        .step-block {
            background-color: #e0f2f1;
            padding: 10px 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            border: 2px solid #b2dfdb;
        }

        .step-label {
            font-size: 0.85em;
            color: #00796b;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .input-row {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 18px;
            color: #004d40;
        }

        /* 輸入元件 */
        select, input {
            padding: 8px;
            font-size: 16px;
            border: 2px solid #80cbc4;
            border-radius: 8px;
            background-color: white;
            color: #00695c;
            font-weight: bold;
            font-family: inherit;
            cursor: pointer;
        }

        input[type="number"] { width: 60px; text-align: center; }

        /* 按鈕群 */
        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 20px;
        }

        button {
            padding: 12px;
            font-size: 18px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            color: white;
            transition: transform 0.1s;
        }
        button:active { transform: scale(0.96); }

        .btn-go { grid-column: 1 / -1; background-color: #43a047; box-shadow: 0 4px #2e7d32; padding: 15px; }
        .btn-retry { background-color: #fb8c00; box-shadow: 0 4px #ef6c00; }
        .btn-new { background-color: #546e7a; box-shadow: 0 4px #37474f; }

        /* 訊息區 */
        #msg-box {
            margin-top: 15px;
            min-height: 50px;
            padding: 10px;
            background: #e8f5e9;
            border-radius: 8px;
            color: #2e7d32;
            font-weight: bold;
            text-align: center;
            border: 1px solid #c8e6c9;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1.4;
        }
        
        .highlight { color: #d84315; background: white; padding: 0 4px; border-radius: 4px; border: 1px solid #ffccbc; }
    </style>
</head>
<body>

    <h1>🧩 多變角色平移挑戰</h1>
    <p class="subtitle">注意看角色的「頭」朝向哪裡！平移時頭的方向不能變喔。</p>

    <div class="main-wrapper">
        <canvas id="gameCanvas" width="500" height="500"></canvas>

        <div class="control-panel">
            <div class="step-block">
                <div class="step-label">第一步</div>
                <div class="input-row">
                    先向
                    <select id="dir1"><option value="right">➡️ 右</option><option value="left">⬅️ 左</option><option value="up">⬆️ 上</option><option value="down">⬇️ 下</option></select>
                    平移
                    <input type="number" id="step1" min="0" max="9" value="0">
                    格
                </div>
            </div>

            <div class="step-block">
                <div class="step-label">第二步</div>
                <div class="input-row">
                    再向
                    <select id="dir2"><option value="down">⬇️ 下</option><option value="up">⬆️ 上</option><option value="right">➡️ 右</option><option value="left">⬅️ 左</option></select>
                    平移
                    <input type="number" id="step2" min="0" max="9" value="0">
                    格
                </div>
            </div>

            <div id="msg-box">請觀察題目，輸入指令！</div>

            <div class="btn-group">
                <button class="btn-go" onclick="runSequence()">🚀 開始平移</button>
                <button class="btn-retry" onclick="retryLevel()">🔄 回到起點 (修正)</button>
                <button class="btn-new" onclick="newLevel()">🎲 換個角色 (下一題)</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const msgBox = document.getElementById('msg-box');

        const gridSize = 50;
        const gridCount = 10;

        // 遊戲狀態
        let startPos = { x: 0, y: 0 };
        let player = { x: 0, y: 0 };
        let target = { x: 0, y: 0 };
        
        // 新增屬性：角色類型與朝向
        let currentLevelData = {
            charType: 0,    // 0:火箭, 1:甲蟲, 2:箭頭, 3:貓咪
            rotation: 0     // 0度(上), 90度(右), 180度(下), 270度(左)
        };
        
        let isMoving = false;

        // --- 1. 產生新題目 (隨機角色、隨機朝向) ---
        function newLevel() {
            // 隨機起點
            startPos.x = Math.floor(Math.random() * 6) + 2; // 避免太靠邊，給點空間
            startPos.y = Math.floor(Math.random() * 6) + 2;
            player.x = startPos.x;
            player.y = startPos.y;

            // 隨機終點 (距離至少3格)
            do {
                target.x = Math.floor(Math.random() * 9);
                target.y = Math.floor(Math.random() * 9);
            } while (Math.abs(target.x - player.x) + Math.abs(target.y - player.y) < 3);

            // 隨機決定角色特徵
            currentLevelData.charType = Math.floor(Math.random() * 4); // 4種角色
            currentLevelData.rotation = Math.floor(Math.random() * 4) * 90; // 0, 90, 180, 270

            // 重置介面
            document.getElementById('step1').value = 0;
            document.getElementById('step2').value = 0;
            msgBox.innerHTML = "新的挑戰來了！<br>請把實體移到影子位置。";
            msgBox.style.color = "#00695c";
            isMoving = false;
            draw();
        }

        // --- 2. 重試 (修正) ---
        function retryLevel() {
            if (isMoving) return;
            player.x = startPos.x;
            player.y = startPos.y;
            msgBox.innerHTML = "回到起點了。<br>這次算仔細一點喔！";
            msgBox.style.color = "#ef6c00";
            draw();
        }

        // --- 3. 執行平移 ---
        async function runSequence() {
            if (isMoving) return;
            
            const d1 = document.getElementById('dir1').value;
            const s1 = parseInt(document.getElementById('step1').value) || 0;
            const d2 = document.getElementById('dir2').value;
            const s2 = parseInt(document.getElementById('step2').value) || 0;

            if (s1 === 0 && s2 === 0) {
                msgBox.innerHTML = "⚠️ 請輸入格數";
                return;
            }

            isMoving = true;
            msgBox.innerHTML = "移動中...<br>注意看，頭的方向沒有變喔！";

            const dirName = { "right": "右", "left": "左", "up": "上", "down": "下" };

            if (s1 > 0) await moveStepByStep(d1, s1);
            if (s1 > 0 && s2 > 0) await new Promise(r => setTimeout(r, 400));
            if (s2 > 0) await moveStepByStep(d2, s2);

            checkWin();
            isMoving = false;
        }

        async function moveStepByStep(direction, steps) {
            let dx = 0, dy = 0;
            if (direction === 'right') dx = 1;
            if (direction === 'left') dx = -1;
            if (direction === 'up') dy = -1;
            if (direction === 'down') dy = 1;

            for (let i = 0; i < steps; i++) {
                let nextX = player.x + dx;
                let nextY = player.y + dy;

                if (nextX >= 0 && nextX < gridCount && nextY >= 0 && nextY < gridCount) {
                    player.x = nextX;
                    player.y = nextY;
                    draw();
                    await new Promise(r => setTimeout(r, 300));
                } else {
                    msgBox.innerHTML = "❌ 撞牆了！";
                    break;
                }
            }
        }

        function checkWin() {
            if (player.x === target.x && player.y === target.y) {
                msgBox.innerHTML = "🎉 成功！<br>完全重疊！";
                ctx.fillStyle = "rgba(255, 235, 59, 0.3)";
                ctx.fillRect(0,0,canvas.width, canvas.height);
            } else {
                msgBox.innerHTML = "還沒對準影子。<br>按 [回到起點] 再試一次。";
                msgBox.style.color = "#d32f2f";
            }
        }

        // --- 4. 繪圖核心 ---
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 畫網格
            ctx.strokeStyle = '#b2dfdb';
            ctx.lineWidth = 1;
            for (let i = 0; i <= gridCount; i++) {
                ctx.beginPath(); ctx.moveTo(i * gridSize, 0); ctx.lineTo(i * gridSize, canvas.height); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0, i * gridSize); ctx.lineTo(canvas.width, i * gridSize); ctx.stroke();
            }
            
            // 畫座標
            ctx.fillStyle = "#80cbc4";
            ctx.font = "12px Arial";
            for(let i=0; i<gridCount; i++) {
                ctx.fillText(i, i*gridSize+4, 12);
                ctx.fillText(i, 4, i*gridSize+12);
            }

            // 畫目標(影子) - 傳入 true
            drawCharacter(target.x, target.y, true);
            
            // 畫玩家(實體) - 傳入 false
            drawCharacter(player.x, player.y, false);
        }

        // --- 5. 角色繪製工廠 (重點) ---
        function drawCharacter(gx, gy, isShadow) {
            const cx = gx * gridSize + gridSize / 2;
            const cy = gy * gridSize + gridSize / 2;
            const type = currentLevelData.charType;
            const rotation = currentLevelData.rotation;

            ctx.save();
            ctx.translate(cx, cy);
            
            // 關鍵：根據題目的隨機角度旋轉畫布
            // 這樣不管角色移動到哪裡，它都是保持這個角度繪製的
            ctx.rotate(rotation * Math.PI / 180);

            // 設定顏色 (影子 vs 實體)
            if (isShadow) {
                ctx.globalAlpha = 0.3;
                ctx.fillStyle = '#546e7a'; // 灰藍色影子
                ctx.strokeStyle = '#37474f';
            } else {
                ctx.globalAlpha = 1.0;
                // 根據角色給不同顏色
                const colors = ['#e57373', '#ba68c8', '#64b5f6', '#ffb74d']; // 紅紫藍橘
                ctx.fillStyle = colors[type];
                ctx.strokeStyle = '#333';
            }

            // 根據類型畫不同圖案 (預設都是頭朝上畫，由上面的 rotate 負責轉向)
            if (type === 0) drawRocket(ctx, isShadow);
            else if (type === 1) drawBeetle(ctx, isShadow);
            else if (type === 2) drawArrow(ctx, isShadow);
            else if (type === 3) drawCat(ctx, isShadow);

            ctx.restore();
        }

        // --- 各種角色的畫法 (統一頭朝上 -Y 方向) ---
        
        function drawRocket(ctx, isShadow) {
            ctx.beginPath();
            ctx.ellipse(0, 0, 10, 20, 0, 0, Math.PI*2); // 機身
            ctx.fill(); ctx.stroke();
            
            // 窗戶
            ctx.fillStyle = isShadow ? '#78909c' : '#e0f7fa';
            ctx.beginPath(); ctx.arc(0, -5, 5, 0, Math.PI*2); ctx.fill();
            
            // 尾翼
            ctx.fillStyle = isShadow ? '#546e7a' : '#d32f2f';
            ctx.beginPath(); ctx.moveTo(-10, 10); ctx.lineTo(-15, 20); ctx.lineTo(-8, 15); ctx.fill();
            ctx.beginPath(); ctx.moveTo(10, 10); ctx.lineTo(15, 20); ctx.lineTo(8, 15); ctx.fill();
        }

        function drawBeetle(ctx, isShadow) {
            ctx.beginPath(); ctx.arc(0, 2, 16, 0, Math.PI*2); ctx.fill(); ctx.stroke(); // 身體
            
            ctx.fillStyle = '#333'; // 頭
            ctx.beginPath(); ctx.arc(0, -12, 8, 0, Math.PI*2); ctx.fill();
            
            // 背上的線
            ctx.beginPath(); ctx.moveTo(0, -5); ctx.lineTo(0, 18); ctx.stroke();
            // 斑點
            if(!isShadow) {
                ctx.fillStyle = '#333';
                ctx.beginPath(); ctx.arc(-6, 5, 2, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(6, 5, 2, 0, Math.PI*2); ctx.fill();
            }
        }

        function drawArrow(ctx, isShadow) {
            ctx.beginPath();
            ctx.moveTo(0, -20); // 箭頭尖端
            ctx.lineTo(15, -5);
            ctx.lineTo(6, -5);
            ctx.lineTo(6, 20);
            ctx.lineTo(-6, 20);
            ctx.lineTo(-6, -5);
            ctx.lineTo(-15, -5);
            ctx.closePath();
            ctx.fill(); ctx.stroke();
            
            // 寫個 N 代表北方/上方
            if(!isShadow) {
                ctx.fillStyle = 'white';
                ctx.font = "bold 10px Arial";
                ctx.fillText("Top", -8, 15);
            }
        }

        function drawCat(ctx, isShadow) {
            // 臉
            ctx.beginPath();
            ctx.moveTo(-15, -10); // 左耳尖
            ctx.lineTo(-10, 10);
            ctx.lineTo(10, 10);
            ctx.lineTo(15, -10); // 右耳尖
            ctx.lineTo(0, -5);   // 額頭中心
            ctx.closePath();
            ctx.fill(); ctx.stroke();

            // 眼睛
            ctx.fillStyle = isShadow ? '#78909c' : '#fff';
            ctx.beginPath(); ctx.arc(-6, 0, 3, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(6, 0, 3, 0, Math.PI*2); ctx.fill();
            
            // 鼻子
            ctx.fillStyle = '#333';
            ctx.beginPath(); ctx.moveTo(-2, 5); ctx.lineTo(2, 5); ctx.lineTo(0, 7); ctx.fill();
        }

        // 啟動
        newLevel();

    </script>
</body>
</html>
